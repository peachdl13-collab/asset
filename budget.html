<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재정관리">
<meta name="theme-color" content="#3ecf8e">
<link rel="manifest" href="manifest.json">
<title>가계부 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:#f7f8fa;color:#1a1d27;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8eaf0;padding:0 1.5rem;display:flex;align-items:center;gap:0;overflow-x:auto}
.tab{padding:1rem 1.2rem;font-size:13px;color:#7a8099;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;transition:color .15s}
.tab.act{color:#1a1d27;border-bottom-color:#3ecf8e;font-weight:600}
.tab:hover{color:#1a1d27}
.back-btn{padding:.8rem 1rem;font-size:13px;color:#7a8099;text-decoration:none;white-space:nowrap;border-right:1px solid #e8eaf0;margin-right:4px;}
.back-btn:hover{color:#1a1d27}
.month-sel{margin-left:auto;border:1px solid #e8eaf0;border-radius:8px;padding:5px 10px;font-size:13px;background:#fff;color:#1a1d27;outline:none}
.panel{display:none;padding:1.5rem;max-width:900px;margin:0 auto}
.panel.act{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e8eaf0;border-radius:12px;padding:1rem 1.1rem}
.card .lbl{font-size:11px;color:#7a8099;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card .val{font-size:1.4rem;font-weight:600}
.card .sub{font-size:11px;color:#adb5c8;margin-top:3px}
.card.pos .val{color:#1a9e6e}
.card.neg .val{color:#e24b4a}
.slabel{font-size:11px;font-weight:600;color:#adb5c8;text-transform:uppercase;letter-spacing:.1em;margin:1.5rem 0 .7rem}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
.bar-row .lbl{width:88px;color:#7a8099;text-align:right;flex-shrink:0;font-size:12px}
.bar-track{flex:1;height:20px;background:#f0f1f5;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;display:flex;align-items:center;min-width:2px}
.bar-pct{font-size:11px;font-weight:600;color:#fff;padding-left:6px;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.18)}
.bar-row .amt{width:80px;text-align:right;font-size:12px;font-weight:500;flex-shrink:0}
.chart-wrap{position:relative;width:100%;margin-bottom:1.5rem}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:#7a8099}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 8px;color:#7a8099;font-weight:500;border-bottom:1px solid #e8eaf0;font-size:12px}
td{padding:8px 8px;border-bottom:1px solid #f0f1f5;color:#1a1d27;vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.b-in{background:#e1f5ee;color:#0e6e53}
.b-out{background:#fdeaea;color:#b83333}
.b-cc{background:#e6f1fb;color:#185fa5}
.b-chk{background:#e1f5ee;color:#0e6e53}
.b-cash{background:#faeeda;color:#854f0b}
.b-pt{background:#eeedfe;color:#3c3489}
.b-etc{background:#f0f1f5;color:#5f6070}
.day-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.day-nav button{padding:5px 13px;border:1px solid #e8eaf0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#7a8099}
.day-nav button:hover{background:#f7f8fa}
.day-date{font-size:15px;font-weight:600;color:#1a1d27}
.week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem}
.wh{text-align:center;font-size:11px;font-weight:600;color:#adb5c8;padding:4px 0}
.wcell{background:#fff;border:1px solid #e8eaf0;border-radius:8px;padding:7px 5px;min-height:68px;font-size:11px;cursor:pointer;transition:background .12s}
.wcell:hover{background:#f0fdf8}
.wcell.today{border-color:#3ecf8e}
.wcell.sel{background:#f0fdf8;border-color:#3ecf8e}
.wcell .dnum{font-size:13px;font-weight:600;color:#1a1d27;margin-bottom:3px}
.wcell .d-in{color:#1a9e6e;font-size:10px}
.wcell .d-out{color:#e24b4a;font-size:10px}
.add-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.add-form input,.add-form select{border:1px solid #e8eaf0;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:#1a1d27;outline:none;width:100%}
.add-form input:focus,.add-form select:focus{border-color:#3ecf8e}
.add-form input[type=number]{-moz-appearance:textfield}
.btn-add{padding:8px 22px;background:#3ecf8e;color:#0d1a12;font-weight:600;font-size:13px;border:none;border-radius:8px;cursor:pointer}
.btn-add:hover{background:#31b87d}
.del-btn{background:none;border:none;color:#adb5c8;cursor:pointer;font-size:13px;padding:2px 6px}
.del-btn:hover{color:#e24b4a}
.amt-pos{color:#1a9e6e;font-weight:500}
.amt-neg{color:#e24b4a;font-weight:500}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← 홈</a>
  <button class="tab act" onclick="switchTab('overview')">월간 개요</button>
  <button class="tab" onclick="switchTab('weekly')">주간 캘린더</button>
  <button class="tab" onclick="switchTab('daily')">일별 상세</button>
  <button class="tab" onclick="switchTab('add')">내역 추가</button>
  <select class="month-sel" id="monthSel" onchange="changeMonth()"></select>
</div>

<div id="tab-overview" class="panel act">
  <div class="cards" id="summaryCards"></div>
  <div class="slabel">수입 출처</div>
  <div id="incomeBar"></div>
  <div class="slabel">지출목록 — 카테고리별</div>
  <div id="expenseCatBar"></div>
  <div class="slabel">지출 수단</div>
  <div id="expenseBar"></div>
  <div class="slabel">월간 수지 흐름</div>
  <div class="legend">
    <span><i style="background:#1a9e6e"></i>수입</span>
    <span><i style="background:#e24b4a"></i>지출</span>
    <span><i style="background:#378add"></i>누적잔액</span>
  </div>
  <div class="chart-wrap" style="height:220px"><canvas id="flowChart"></canvas></div>
</div>

<div id="tab-weekly" class="panel">
  <div class="week-header" id="weekHeader"></div>
  <div class="week-grid" id="weekGrid"></div>
  <div class="slabel" id="selDayLabel">날짜를 선택하세요</div>
  <div id="weekDayDetail"></div>
</div>

<div id="tab-daily" class="panel">
  <div class="day-nav">
    <button onclick="prevDay()">&#8592;</button>
    <span class="day-date" id="dayLabel"></span>
    <button onclick="nextDay()">&#8594;</button>
  </div>
  <div class="cards" id="dayCards"></div>
  <div id="dayTable"></div>
</div>

<div id="tab-add" class="panel">
  <div class="slabel" style="margin-top:0">새 내역 입력</div>
  <div class="add-form">
    <select id="nType" onchange="updateCatMethod()">
      <option value="income">수입</option>
      <option value="expense">지출</option>
    </select>
    <input type="date" id="nDate"/>
    <select id="nCat"></select>
    <select id="nMethod"></select>
    <input type="number" id="nAmt" placeholder="금액 (원)" min="0"/>
    <input type="text" id="nMemo" placeholder="메모 (선택)"/>
  </div>
  <button type="button" id="addBtn" class="btn-add" onclick="addEntry()">추가하기</button>
  <div class="slabel">이번 달 전체 내역</div>
  <div id="allTable"></div>
</div>

<script>
var INCOME_CATS = ['임금','정부지원금','프리랜서','이자/배당','기타'];
var EXPENSE_CATS = ['의류','교통','생필품','식비','경조사','문화생활','건강','공과금','후원금','기타'];
var INCOME_METHODS = ['신용카드','체크카드','현금','계좌이체','기타'];
var EXPENSE_METHODS = ['신용카드','체크카드','현금','계좌이체','기타'];
var METHOD_COLORS = {'신용카드':'#378add','체크카드':'#1a9e6e','현금':'#f5a623','기타':'#888780','계좌이체':'#2dd4bf'};

var CAT_COLORS = {'의류':'#f06595','교통':'#378add','생필품':'#1a9e6e','식비':'#f5a623','경조사':'#e24b4a','문화생활':'#7f77dd','건강':'#2dd4bf','공과금':'#f0953a','후원금':'#3ecf8e','기타':'#888780'};

var curMonth = '2026-03';
var curDay = null;
var flowChart = null;
var nextId = 1;

var data = {};

/* ── localStorage ── */
var LS_KEY = 'finance_budget_v1';
function saveData(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({data:data, nextId:nextId})); }catch(e){}
}
function loadData(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      if(parsed.data)   data   = parsed.data;
      if(parsed.nextId) nextId = parsed.nextId;
    }
  }catch(e){}
}
loadData();

function fmt(n){ return n.toLocaleString('ko-KR')+'원'; }
function getE(){ return data[curMonth]||[]; }
function totInc(){ return getE().filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amt;},0); }
function totExp(){ return getE().filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amt;},0); }

function switchTab(t){
  var tabs = document.querySelectorAll('.tab');
  var names = ['overview','weekly','daily','add'];
  tabs.forEach(function(b,i){ b.classList.remove('act'); if(names[i]===t) b.classList.add('act'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('act'); });
  document.getElementById('tab-'+t).classList.add('act');
  if(t==='overview') renderOverview();
  if(t==='weekly')   renderWeekly();
  if(t==='daily')    { if(!curDay) curDay=curMonth+'-15'; renderDay(); }
  if(t==='add')      { updateCatMethod(); setTodayDate(); renderAllTable(); }
}

function changeMonth(){
  curMonth = document.getElementById('monthSel').value;
  curDay = null;
  renderOverview();
}

function renderOverview(){
  var inc=totInc(), exp=totExp(), net=inc-exp;
  document.getElementById('summaryCards').innerHTML=
    '<div class="card pos"><div class="lbl">총 수입</div><div class="val">'+fmt(inc)+'</div></div>'+
    '<div class="card neg"><div class="lbl">총 지출</div><div class="val">'+fmt(exp)+'</div></div>'+
    '<div class="card '+(net>=0?'pos':'neg')+'"><div class="lbl">순 잔액</div><div class="val">'+fmt(Math.abs(net))+'</div><div class="sub">'+(net>=0?'흑자':'적자')+'</div></div>'+
    '<div class="card"><div class="lbl">내역 수</div><div class="val">'+getE().length+'건</div></div>';

  var incByCat={};
  getE().filter(function(e){return e.type==='income';}).forEach(function(e){ incByCat[e.cat]=(incByCat[e.cat]||0)+e.amt; });
  var totInc2=Object.values(incByCat).reduce(function(s,v){return s+v;},0)||1;
  document.getElementById('incomeBar').innerHTML=Object.entries(incByCat).sort(function(a,b){return b[1]-a[1];})
    .map(function(x){ var c=x[0],v=x[1],pct=Math.round(v/totInc2*100);
      return '<div class="bar-row"><div class="lbl">'+c+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:#1a9e6e"><span class="bar-pct">'+pct+'%</span></div></div><div class="amt">'+fmt(v)+'</div></div>'; }).join('');

  var expByCat={};
  getE().filter(function(e){return e.type==='expense';}).forEach(function(e){ expByCat[e.cat]=(expByCat[e.cat]||0)+e.amt; });
  var totExpCat=Object.values(expByCat).reduce(function(s,v){return s+v;},0)||1;
  document.getElementById('expenseCatBar').innerHTML=Object.entries(expByCat).sort(function(a,b){return b[1]-a[1];})
    .map(function(x){ var c=x[0],v=x[1],pct=Math.round(v/totExpCat*100);
      return '<div class="bar-row"><div class="lbl">'+c+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(CAT_COLORS[c]||'#888')+'"><span class="bar-pct">'+pct+'%</span></div></div><div class="amt">'+fmt(v)+'</div></div>'; }).join('');

  var expByM={};
  getE().filter(function(e){return e.type==='expense';}).forEach(function(e){ expByM[e.method]=(expByM[e.method]||0)+e.amt; });
  var totExpM=Object.values(expByM).reduce(function(s,v){return s+v;},0)||1;
  document.getElementById('expenseBar').innerHTML=Object.entries(expByM).sort(function(a,b){return b[1]-a[1];})
    .map(function(x){ var m=x[0],v=x[1],pct=Math.round(v/totExpM*100);
      return '<div class="bar-row"><div class="lbl">'+m+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(METHOD_COLORS[m]||'#888')+'"><span class="bar-pct">'+pct+'%</span></div></div><div class="amt">'+fmt(v)+'</div></div>'; }).join('');

  renderFlowChart();
}

function renderFlowChart(){
  var parts=curMonth.split('-'); var y=+parts[0],mo=+parts[1];
  var days=new Date(y,mo,0).getDate();
  var labels=[],incArr=[],expArr=[],balArr=[],cum=0;
  for(var d=1;d<=days;d+=3){
    var ds=curMonth+'-'+(d<10?'0':'')+d;
    var di=getE().filter(function(e){return e.type==='income'&&e.date===ds;}).reduce(function(s,e){return s+e.amt;},0);
    var de=getE().filter(function(e){return e.type==='expense'&&e.date===ds;}).reduce(function(s,e){return s+e.amt;},0);
    cum+=di-de; labels.push(d+'일'); incArr.push(di); expArr.push(de); balArr.push(cum);
  }
  if(flowChart) flowChart.destroy();
  var ctx=document.getElementById('flowChart').getContext('2d');
  flowChart=new Chart(ctx,{
    data:{labels:labels,datasets:[
      {type:'bar',  label:'수입',   data:incArr, backgroundColor:'rgba(26,158,110,0.65)', yAxisID:'y'},
      {type:'bar',  label:'지출',   data:expArr, backgroundColor:'rgba(226,75,74,0.55)',  yAxisID:'y'},
      {type:'line', label:'누적잔액', data:balArr, borderColor:'#378add', backgroundColor:'rgba(55,138,221,0.07)', tension:0.4, pointRadius:3, yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y: {position:'left',  ticks:{callback:function(v){return v/10000+'만';}, font:{size:11}}, grid:{display:false}},
        y2:{position:'right', ticks:{callback:function(v){return v/10000+'만';}, font:{size:11}}, grid:{color:'rgba(0,0,0,.05)'}}
      }
    }
  });
}

function fmtCell(n){
  if(n<=0) return '';
  if(n<10000) return n.toLocaleString('ko-KR')+'원';
  return (n/10000).toFixed(0)+'만';
}

function renderWeekly(){
  var parts=curMonth.split('-'); var y=+parts[0],mo=+parts[1];
  var days=new Date(y,mo,0).getDate();
  var firstDow=new Date(y,mo-1,1).getDay();
  document.getElementById('weekHeader').innerHTML=['일','월','화','수','목','금','토'].map(function(h){return '<div class="wh">'+h+'</div>';}).join('');
  var cells='';
  for(var i=0;i<firstDow;i++) cells+='<div></div>';
  var today=new Date();
  for(var d=1;d<=days;d++){
    var ds=curMonth+'-'+(d<10?'0':'')+d;
    var di=getE().filter(function(e){return e.type==='income'&&e.date===ds;}).reduce(function(s,e){return s+e.amt;},0);
    var de=getE().filter(function(e){return e.type==='expense'&&e.date===ds;}).reduce(function(s,e){return s+e.amt;},0);
    var isToday=today.getFullYear()===y&&today.getMonth()===mo-1&&today.getDate()===d;
    var isSel=curDay===ds;
    cells+='<div class="wcell'+(isToday?' today':'')+(isSel?' sel':'')+'" onclick="selWeekDay(\''+ds+'\')">'+
      '<div class="dnum">'+d+'</div>'+
      (di>0?'<div class="d-in">+'+fmtCell(di)+'</div>':'')+
      (de>0?'<div class="d-out">-'+fmtCell(de)+'</div>':'')+
      '</div>';
  }
  document.getElementById('weekGrid').innerHTML=cells;
  if(curDay) renderWeekDayDetail(curDay);
}

function selWeekDay(ds){ curDay=ds; renderWeekly(); }

function renderWeekDayDetail(ds){
  var parts=ds.split('-'); var m=parts[1],d=parts[2];
  document.getElementById('selDayLabel').textContent=m+'월 '+d+'일 내역';
  var es=getE().filter(function(e){return e.date===ds;});
  if(!es.length){ document.getElementById('weekDayDetail').innerHTML='<p style="font-size:13px;color:#adb5c8">내역 없음</p>'; return; }
  document.getElementById('weekDayDetail').innerHTML='<table><tr><th>구분</th><th>카테고리</th><th>수단</th><th>금액</th><th>메모</th></tr>'+
    es.map(function(e){return '<tr><td><span class="badge '+(e.type==='income'?'b-in':'b-out')+'">'+(e.type==='income'?'수입':'지출')+'</span></td><td>'+e.cat+'</td><td>'+badgeMethod(e.method)+'</td><td class="'+(e.type==='income'?'amt-pos':'amt-neg')+'">'+(e.type==='income'?'+':'-')+fmt(e.amt)+'</td><td style="color:#7a8099">'+e.memo+'</td></tr>';}).join('')+'</table>';
}

function renderDay(){
  if(!curDay) curDay=curMonth+'-01';
  var parts=curDay.split('-');
  document.getElementById('dayLabel').textContent=parts[0]+'년 '+parts[1]+'월 '+parts[2]+'일';
  var es=getE().filter(function(e){return e.date===curDay;});
  var di=es.filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amt;},0);
  var de=es.filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amt;},0);
  document.getElementById('dayCards').innerHTML=
    '<div class="card pos"><div class="lbl">오늘 수입</div><div class="val">'+fmt(di)+'</div></div>'+
    '<div class="card neg"><div class="lbl">오늘 지출</div><div class="val">'+fmt(de)+'</div></div>'+
    '<div class="card"><div class="lbl">건수</div><div class="val">'+es.length+'건</div></div>';
  if(!es.length){ document.getElementById('dayTable').innerHTML='<p style="font-size:13px;color:#adb5c8;padding:.5rem 0">내역 없음</p>'; return; }
  document.getElementById('dayTable').innerHTML='<table><tr><th>구분</th><th>카테고리</th><th>수단</th><th>금액</th><th>메모</th><th></th></tr>'+
    es.map(function(e){return '<tr><td><span class="badge '+(e.type==='income'?'b-in':'b-out')+'">'+(e.type==='income'?'수입':'지출')+'</span></td><td>'+e.cat+'</td><td>'+badgeMethod(e.method)+'</td><td class="'+(e.type==='income'?'amt-pos':'amt-neg')+'">'+(e.type==='income'?'+':'-')+fmt(e.amt)+'</td><td style="color:#7a8099">'+e.memo+'</td><td><button class="del-btn" onclick="delEntry('+e.id+');renderDay()">&#x2715;</button></td></tr>';}).join('')+'</table>';
}

function prevDay(){
  var d=new Date(curDay); d.setDate(d.getDate()-1);
  var nd=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
  if(nd.indexOf(curMonth)===0){ curDay=nd; renderDay(); }
}
function nextDay(){
  var d=new Date(curDay); d.setDate(d.getDate()+1);
  var nd=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
  if(nd.indexOf(curMonth)===0){ curDay=nd; renderDay(); }
}

function badgeMethod(m){
  var cls={'신용카드':'b-cc','체크카드':'b-chk','현금':'b-cash','계좌이체':'b-in'};
  return '<span class="badge '+(cls[m]||'b-etc')+'">'+m+'</span>';
}

function updateCatMethod(){
  var type=document.getElementById('nType').value;
  var meths=type==='income'?INCOME_METHODS:EXPENSE_METHODS;
  var catHtml='';
  if(type==='income'){
    catHtml=INCOME_CATS.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
  } else {
    catHtml='<optgroup label="── 지출목록 ──">'+EXPENSE_CATS.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('')+'</optgroup>';
  }
  document.getElementById('nCat').innerHTML=catHtml;
  document.getElementById('nMethod').innerHTML=meths.map(function(m){return '<option value="'+m+'">'+m+'</option>';}).join('');
}

function setTodayDate(){
  var t=new Date();
  document.getElementById('nDate').value=t.getFullYear()+'-'+(t.getMonth()+1<10?'0':'')+(t.getMonth()+1)+'-'+(t.getDate()<10?'0':'')+t.getDate();
}

function renderAllTable(){
  var es=getE().slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  if(!es.length){ document.getElementById('allTable').innerHTML='<p style="font-size:13px;color:#adb5c8">내역 없음</p>'; return; }
  document.getElementById('allTable').innerHTML='<table><tr><th>날짜</th><th>구분</th><th>카테고리</th><th>수단</th><th>금액</th><th>메모</th><th></th></tr>'+
    es.map(function(e){return '<tr><td style="white-space:nowrap;color:#7a8099">'+e.date.slice(5)+'</td><td><span class="badge '+(e.type==='income'?'b-in':'b-out')+'">'+(e.type==='income'?'수입':'지출')+'</span></td><td>'+e.cat+'</td><td>'+badgeMethod(e.method)+'</td><td class="'+(e.type==='income'?'amt-pos':'amt-neg')+'">'+(e.type==='income'?'+':'-')+fmt(e.amt)+'</td><td style="color:#7a8099">'+e.memo+'</td><td><button class="del-btn" onclick="delEntry('+e.id+');renderAllTable()">&#x2715;</button></td></tr>';}).join('')+'</table>';
}

function addEntry(){
  var type=document.getElementById('nType').value;
  var date=document.getElementById('nDate').value;
  var cat=document.getElementById('nCat').value;
  var method=document.getElementById('nMethod').value;
  var amt=parseInt(document.getElementById('nAmt').value)||0;
  var memo=document.getElementById('nMemo').value;
  if(!date){ alert('날짜를 입력하세요.'); return; }
  if(!amt){ alert('금액을 입력하세요.'); return; }
  var m=date.slice(0,7);
  if(!data[m]) data[m]=[];
  data[m].push({id:nextId++,type:type,date:date,cat:cat,method:method,amt:amt,memo:memo});
  saveData();
  document.getElementById('nAmt').value='';
  document.getElementById('nMemo').value='';
  /* 드롭다운 갱신 후 해당 월 선택 */
  curMonth=m;
  buildMonthSel();
  /* 성공 피드백 */
  var btn=document.getElementById('addBtn');
  if(btn){
    var orig=btn.textContent;
    btn.textContent='✓ 추가됨';
    btn.style.background='#1a9e6e';
    setTimeout(function(){ btn.textContent=orig; btn.style.background=''; },1200);
  }
  renderAllTable();
}

function delEntry(id){
  Object.keys(data).forEach(function(m){ data[m]=data[m].filter(function(e){return e.id!==id;}); });
  saveData();
}

/* 월 드롭다운 동적 생성 */
function buildMonthSel(){
  var sel = document.getElementById('monthSel');
  var now = new Date();
  var thisMonth = now.getFullYear()+'-'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1);
  /* data에 있는 월 + 현재 월 합치기 */
  var months = Object.keys(data);
  if(months.indexOf(thisMonth)===-1) months.push(thisMonth);
  months.sort(function(a,b){return b.localeCompare(a);}); /* 최신순 */
  sel.innerHTML = months.map(function(m){
    var parts=m.split('-');
    return '<option value="'+m+'">'+ parts[0]+'년 '+parseInt(parts[1])+'월</option>';
  }).join('');
  /* curMonth가 목록에 없으면 현재 월로 */
  if(months.indexOf(curMonth)===-1) curMonth=thisMonth;
  sel.value = curMonth;
}

buildMonthSel();
updateCatMethod();
renderOverview();
</script>
</body>
</html>
