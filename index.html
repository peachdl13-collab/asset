<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재정관리">
<meta name="theme-color" content="#3ecf8e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>나의 재정 관리</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: rgba(255,255,255,0.07);
    --green: #3ecf8e;
    --text: #e8eaf0;
    --muted: #7a8099;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Pretendard', sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  .logo {
    width: 72px; height: 72px;
    background: rgba(62,207,142,0.15);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 1.2rem;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 360px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.4rem 1.6rem;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 1.2rem;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 18px 18px 0 0;
  }
  .card-budget::before { background: #3ecf8e; }
  .card-asset::before  { background: #5b9cf6; }
  .card:active { transform: scale(0.98); }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .icon-budget { background: rgba(62,207,142,0.12); }
  .icon-asset  { background: rgba(91,156,246,0.12); }
  .card-info { flex: 1; }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .card-arrow {
    font-size: 18px;
    color: var(--muted);
  }
  .footer {
    margin-top: 3rem;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }
  #installBtn {
    display: none;
    margin-top: 1.5rem;
    padding: 10px 28px;
    background: var(--green);
    color: #0d1a12;
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="logo">💰</div>
<h1>나의 재정 관리</h1>
<p class="subtitle">가계부 · 자산 한눈에 보기</p>

<div class="cards">
  <a href="budget.html" class="card card-budget">
    <div class="card-icon icon-budget">📒</div>
    <div class="card-info">
      <div class="card-title">가계부</div>
      <div class="card-desc">수입 · 지출 월별 관리<br>주간 캘린더 · 일별 상세</div>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a href="asset.html" class="card card-asset">
    <div class="card-icon icon-asset">📊</div>
    <div class="card-info">
      <div class="card-title">자산 관리</div>
      <div class="card-desc">예금 · 적금 · 주식 · 현물<br>순자산 · 부채 현황</div>
    </div>
    <span class="card-arrow">›</span>
  </a>
</div>

<button id="installBtn" onclick="installApp()">홈 화면에 설치</button>

<div class="footer">
  데이터는 기기에만 저장됩니다<br>
  외부 서버로 전송되지 않습니다
</div>

<script>
// PWA 설치 프롬프트
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBtn').style.display = 'none';
  });
}

// Service Worker 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW error:', e));
}
</script>
</body>
</html>
